name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      SECRET_KEY: ci-test-secret-do-not-use-in-production
      ENVIRONMENT: test
      DEMO_MODE: "false"
      FRONTEND_URL: http://localhost:5173
      APP_NAME: ValoTracker-CI
      APP_VERSION: 0.0.0-ci
      # Settings usa VALORANT_API_KEY (no HENRIKDEV_API_KEY); sin esto falla al importar app.
      VALORANT_API_KEY: ci-mock-not-used-in-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply database schema (auth + phase2)
        run: |
          python scripts/migrate_auth.py
          python scripts/migrate_phase2.py

      - name: Lint with ruff
        run: ruff check app/ --output-format=github || true

      - name: Run tests
        run: pytest tests/ -v --tb=short
